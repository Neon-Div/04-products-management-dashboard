<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title -->
  <title>Products-Management-Dashboard</title>

  <!-- CSS File Bundle Includes Popper -->
  <link rel="stylesheet" href="./assets/libs/bootstrap.min.css">

  <!-- Custom Style CSS -->
  <link rel="stylesheet" href="./dist/css/style.css" />
</head>

<body class="bg-light">
  <div class="container my-5">

    <!-- 1. Dashboard Header -->
    <div class="text-center mb-4">
      <h2>Products Management Dashboard</h2>
      <p class="text-muted">Professional CRUD System to Manage Products</p>
    </div>

    <!-- 2. Product Information Form -->
    <div class="card p-4 shadow-sm mb-4 border-0 bg-white">
      <h5 class="fw-bold mb-4 text-primary">Product Information:</h5>

      <div class="row g-3">

        <div class="col-12">
          <input type="text" id="title" class="form-control" placeholder="Product Title" aria-label="Product Title">
        </div>

        <!-- Financial Details -->
        <!-- Input: Price -->
        <div class="col-12 col-md-3">
          <input type="number" id="price" class="form-control" placeholder="Price" aria-label="Price">
        </div>

        <!-- Input: Taxes -->
        <div class="col-12 col-md-2">
          <input type="number" id="taxes" class="form-control" placeholder="Taxes" aria-label="Taxes">
        </div>

        <!-- Input: Ads -->
        <div class="col-12 col-md-2">
          <input type="number" id="ads" class="form-control" placeholder="Ads" aria-label="Ads">
        </div>

        <!-- Input: Discount -->
        <div class="col-12 col-md-3">
          <input type="number" id="discount" class="form-control" placeholder="Discount" aria-label="Discount">
        </div>

        <!-- Display: Total Price -->
        <div class="col-12 col-md-2">
          <div id="total"
            class="bg-danger text-white text-center fw-bold rounded p-2 d-flex align-items-center justify-content-center"
            style="min-height: 38px;">
            Total: 0
          </div>
        </div>

        <!-- Stock & Classification -->
        <!-- Input: Count -->
        <div class="col-12 col-md-6 mt-3">
          <input type="number" id="count" class="form-control" placeholder="Count" aria-label="Count">
        </div>

        <!-- Input: Category -->
        <div class="col-12 col-md-6 mt-3">
          <input type="text" id="category" class="form-control" placeholder="Category" aria-label="Category">
        </div>

        <!-- Action: Sumbit Button -->
        <div class="col-12 mt-4">
          <button id="submit" class="btn btn-primary w-100 fw-bold py-2 fs-5">Create Product</button>
        </div>

      </div>
    </div>

    <!-- 3. Search & Filter Controls -->
    <div class="card p-4 shadow-sm mb-4 border-0 bg-white">
      <!-- Input: Search Bar -->
      <div class="row g-3">
        <div class="col-12">
          <input type="text" id="search" class="form-control" placeholder="Search" aria-label="Search">
        </div>

        <!-- Search Action Buttons -->
        <div class="col-md-6">
          <button id="searchTitle" class="btn btn-outline-primary w-100 fw-bold py-2">Search By Title</button>
        </div>
        <div class="col-md-6">
          <button id="searchCategory" class="btn btn-outline-primary w-100 fw-bold py-2">Search By Category</button>
        </div>

        <!-- Container: Dynamic "Delete All Button" -->
        <div class="col-12 mt-3" id="deleteAllBox"></div>
      </div>
    </div>

    <!-- 4. Product Data Table -->
    <div class="card p-4 shadow-sm mb-4 border-0 bg-white">
      <h5 class="fw-bold mb-4 text-success">Available Products:</h5>
      <div class="table-responsive">
        <table class="table table-striped table-hover text-center align-middle m-0">
          <!-- Table Headers -->
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Price</th>
              <th>Taxes</th>
              <th>Ads</th>
              <th>Discount</th>
              <th>Total</th>
              <th>Category</th>
              <th>Update</th>
              <th>Delete</th>
            </tr>
          </thead>
          <!-- Table Body: Rendered dynamically via JavaScript -->
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <!-- JS File Bundle Includes Popper -->
  <script src="./assets/libs/bootstrap.bundle.min.js"></script>
  <!-- Custom Main JS -->
  <script src="./src/js/main.js"></script>
</body>

</html>
