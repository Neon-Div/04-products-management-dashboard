<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title -->
  <title>Products-Mangement-Dashboard</title>

  <!-- BootStrap File -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet" />

  <!-- CSS File -->
  <link rel="stylesheet" href="/dist/css/style.css" />
</head>

<body class="bg-light">
  <div class="container mb-5">
    <div class="text-center mb-4">
      <h2>Products Mangement Dashboard</h2>
      <p class="text-muted">Professional CRUD System to Manage Products</p>
    </div>

    <div class="card p-4 shadow-sm mb-4 border-0">
      <h5 class="fw-bold mb-4 text-primary">Product Information:</h5>

      <div class="row g-3">
        <div class="col-12">
          <input type="text" id="title" class="form-control" placeholder="Product Title" aria-label="Product Title">
        </div>

        <div class="col-md-3">
          <input type="number" id="price" class="form-control" placeholder="Price" aria-label="Price">
        </div>
        <div class="col-md-2">
          <input type="number" id="taxes" class="form-control" placeholder="Taxes" aria-label="Taxes">
        </div>
        <div class="col-md-2">
          <input type="number" id="ads" class="form-control" placeholder="Ads" aria-label="Ads">
        </div>
        <div class="col-md-2">
          <input type="number" id="discount" class="form-control" placeholder="Discount" aria-label="Discount">
        </div>

        <div class="col-md-3">
          <div id="total"
            class="bg-danger text-white text-center fw-bold rounded p-2 d-flex align-items-center justify-content-center">
            Total: 0
          </div>
        </div>

        <div class="col-md-6">
          <input type="text" id="count" class="form-control" placeholder="Count" aria-label="Count">
        </div>
        <div class="col-md-6">
          <input type="text" id="category" class="form-control" placeholder="Category" aria-label="Category">
        </div>
        <div class="col-12 mt-4">
          <button id="submit" class="btn btn-primary w-100 fw-bold py-2 fs-5">Create Product</button>
        </div>
      </div>
    </div>
    <div class="card p-4 shadow-sm mb-4 border-0">
      <div class="row g-3">
        <div class="col-12">
          <input type="text" id="search" class="form-control" placeholder="Search" aria-label="Search....">
        </div>
        <div class="col-md-6">
          <button id="searchTitle" class="btn btn-outline-primary w-100 fw-bold">Search By Title</button>
        </div>
        <div class="col-md-6">
          <button id="searchCategory" class="btn btn-outline-primary w-100 fw-bold">Search By Catagory</button>
        </div>
        <div class="col-12 mt-3" id="deleteAllBox"></div>
      </div>
    </div>
    <div class="card p-4 shadow-sm mb-4 border-0">
      <h5 class="fw-bold mb-4 text-success">Available Products:</h5>
      <div class="table-responsive">
        <table class="table table-striped table-hover text-center align-middle m-0">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Price</th>
              <th>Taxes</th>
              <th>Ads</th>
              <th>Discount</th>
              <th>Total</th>
              <th>Category</th>
              <th>Update</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <!-- JS File Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- JS File -->
  <script src="/src/js/app.js"></script>
</body>

</html>
